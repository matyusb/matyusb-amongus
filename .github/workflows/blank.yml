name: Release checksums

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  checksums:
    runs-on: ubuntu-latest

    steps:
      - name: Download assets and upload SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          echo "Release tag: $RELEASE_TAG"

          mkdir -p release-assets

          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir release-assets

          cd release-assets

          find . \
            -maxdepth 1 \
            -type f \
            ! -name "SHA256SUMS.txt" \
            -printf '%P\0' \
            | sort -z \
            | xargs -0 sha256sum \
            > ../SHA256SUMS.txt

          cd ..

          if [ ! -s SHA256SUMS.txt ]; then
            echo "Nem találhatók release assetek."
            exit 1
          fi

          cat SHA256SUMS.txt

          gh release upload "$RELEASE_TAG" SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
