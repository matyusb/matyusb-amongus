name: Release checksums

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to process
        required: true
        type: string

permissions:
  contents: write

jobs:
  checksums:
    runs-on: ubuntu-latest
    steps:
      - name: Download assets and upload SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_TAG"

          mkdir release-assets
          cd release-assets

          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --skip-existing

          rm -f SHA256SUMS.txt

          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt

          test -s SHA256SUMS.txt
          cat SHA256SUMS.txt

          gh release upload "$RELEASE_TAG" SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
